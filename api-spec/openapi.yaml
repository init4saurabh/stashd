openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Stashd API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: links
    description: Saved link operations
  - name: collections
    description: Collection folder operations
  - name: tags
    description: Tag operations
  - name: ai
    description: AI-powered operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /links:
    get:
      operationId: listLinks
      tags: [links]
      summary: List saved links
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [to_read, reading, done]
        - name: collectionId
          in: query
          schema:
            type: integer
        - name: tag
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest, unread_first]
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Link"
    post:
      operationId: createLink
      tags: [links]
      summary: Save a new link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
      responses:
        "201":
          description: Link saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"

  /links/stats:
    get:
      operationId: getLinkStats
      tags: [links]
      summary: Get aggregate stats for the vault
      responses:
        "200":
          description: Vault statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultStats"

  /links/scrape:
    post:
      operationId: scrapeUrl
      tags: [links]
      summary: Fetch Open Graph metadata from a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScrapeInput"
      responses:
        "200":
          description: Scraped metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapedMeta"

  /links/search:
    post:
      operationId: searchLinks
      tags: [links]
      summary: Natural-language semantic search across saved links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInput"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Link"

  /links/{id}:
    get:
      operationId: getLink
      tags: [links]
      summary: Get a saved link by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "404":
          description: Not found
    patch:
      operationId: updateLink
      tags: [links]
      summary: Update a saved link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkUpdate"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "404":
          description: Not found
    delete:
      operationId: deleteLink
      tags: [links]
      summary: Delete a saved link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /links/{id}/status:
    patch:
      operationId: updateLinkStatus
      tags: [links]
      summary: Toggle the read status of a link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"

  /links/{id}/ai-enrich:
    post:
      operationId: enrichLink
      tags: [ai]
      summary: Run AI summarize + auto-tag on a link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enriched link with summary and tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"

  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List all collections
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a new collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Created collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /collections/{id}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get a collection by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Not found
    patch:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionUpdate"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Delete a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags with usage counts
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Link:
      type: object
      required: [id, url, title, status, tags, createdAt]
      properties:
        id:
          type: integer
        url:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        siteName:
          type: ["string", "null"]
        favicon:
          type: ["string", "null"]
        aiSummary:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]
        status:
          type: string
          enum: [to_read, reading, done]
        tags:
          type: array
          items:
            type: string
        collectionId:
          type: ["integer", "null"]
        collectionName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isStale:
          type: boolean
        createdAt:
          type: string

    LinkInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        siteName:
          type: string
        favicon:
          type: string
        readingTimeMinutes:
          type: integer
        collectionId:
          type: integer
        tags:
          type: array
          items:
            type: string
        notes:
          type: string

    LinkUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        collectionId:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string
        notes:
          type: string
        status:
          type: string
          enum: [to_read, reading, done]

    StatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [to_read, reading, done]

    ScrapeInput:
      type: object
      required: [url]
      properties:
        url:
          type: string

    ScrapedMeta:
      type: object
      required: [url]
      properties:
        url:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        siteName:
          type: ["string", "null"]
        favicon:
          type: ["string", "null"]
        readingTimeMinutes:
          type: ["integer", "null"]

    SearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string

    VaultStats:
      type: object
      required: [total, toRead, reading, done, stale, collectionsCount, tagsCount]
      properties:
        total:
          type: integer
        toRead:
          type: integer
        reading:
          type: integer
        done:
          type: integer
        stale:
          type: integer
        collectionsCount:
          type: integer
        tagsCount:
          type: integer

    Collection:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        linkCount:
          type: integer
        createdAt:
          type: string

    CollectionInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    CollectionUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]

    Tag:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer